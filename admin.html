<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>CineMaster TV - Smart Admin Panel</title>
    <style>
        :root { --bg-color: #0f1115; --panel-color: #181d26; --accent-color: #536dfe; --text-color: #e3e8f0; --border-color: #262f3d; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px; max-width: 1400px; margin: 0 auto; }
        .panel { background: var(--panel-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); margin-bottom: 25px; }
        h2 { margin-top: 0; font-size: 20px; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .video-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; user-select: none; }
        video { width: 100%; height: 100%; }
        .tv-watermark { position: absolute; top: 20px; left: 20px; width: 60px; opacity: 0.7; cursor: move; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); z-index: 10; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { font-size: 12px; color: #8a99ad; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; background: #11141a; border: 1px solid var(--border-color); color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 14px; color-scheme: dark; }
        button { background: var(--accent-color); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; transition: 0.2s; }
        button:hover { background: #3d5afe; }
        button:disabled { background: #2c323f; color: #627288; cursor: not-allowed; }
        .catcast-timeline { background: #11141a; border: 1px solid var(--border-color); border-radius: 8px; max-height: 250px; overflow-y: auto; padding: 15px; margin-top: 15px; }
        .timeline-card { position: relative; background: #1f2633; border-left: 4px solid var(--accent-color); margin-bottom: 10px; padding: 15px; border-radius: 0 6px 6px 0; display: flex; align-items: center; justify-content: space-between; }
        .card-time { font-family: monospace; font-weight: bold; color: #ffb300; font-size: 14px; min-width: 130px; }
        .card-info { flex-grow: 1; margin-left: 15px; }
        .card-title { font-weight: 600; color: #fff; margin-bottom: 4px; font-size: 14px; }
        .card-url { font-size: 11px; color: #627288; word-break: break-all; }
        .card-duration { font-size: 12px; background: #11141a; padding: 4px 8px; border-radius: 4px; color: #a4b3c6; }
        
        /* ÚJ TÖRLES GOMB STÍLUSA */
        .btn-delete-track { background: #ff1744; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; margin-left: 15px; transition: 0.2s; }
        .btn-delete-track:hover { background: #b71c1c; }

        .btn-logo-save { background: #00b0ff; margin-top: 15px; border: 1px solid #0091ea; }
        .btn-logo-save:hover { background: #0091ea; }
        .btn-download { background: #00e676; color: #000; margin-top: 15px; }
        .btn-download:hover { background: #00c853; }
        .btn-create { background: #37474f; color: #fff; }
        .btn-create:hover { background: #263238; }
        
        .btn-load { background: #ff9100; color: #000; font-weight: bold; }
        .btn-load:hover { background: #ff6d00; }
        
        input[type="range"] { padding: 0; height: 10px; background: #11141a; border: none; cursor: pointer; }
        .status-msg { margin-top: 8px; font-size: 13px; font-weight: bold; text-align: center; }
        .section-divider { border: 0; height: 1px; background: var(--border-color); margin: 25px 0; }
    </style>
</head>
<body>

<div class="dashboard">
    <div>
        <div class="panel">
            <h2>✨ Új Csatorna Rendszerbe Vétele</h2>
            <div class="input-row">
                <div>
                    <label>Csatorna Megjelenési Neve:</label>
                    <input type="text" id="newChannelName" placeholder="pl. CineMaster Retro">
                </div>
                <div>
                    <label>Fájl Azonosító (id):</label>
                    <input type="text" id="newChannelId" placeholder="pl. retrotv">
                </div>
            </div>
            <button class="btn-create" onclick="createNewChannelConfig()">Csatorna regisztráció (channels.json)</button>
        </div>

        <div class="panel">
            <h2>📺 Élő Monitor & Logó Pozicionáló</h2>
            <div class="video-box" id="videoBoxContainer">
                <img id="channelLogoImg" src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Logo_TV_2015.png" class="tv-watermark" alt="Logo">
                <video id="catcastEngine" controls autoplay muted crossorigin="anonymous"></video>
            </div>
            
            <div style="margin-top: 20px; background: #11141a; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);">
                <h3 style="margin-top:0; font-size: 14px; color:#fff;">Arculati Logó Beállítások</h3>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Melyik csatornához mented a logót?:</label>
                    <input type="text" id="logoChannelId" value="cinemaster">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Logó Kép URL (.png)</label>
                    <input type="text" id="logoUrlInput" value="https://upload.wikimedia.org/wikipedia/commons/a/ab/Logo_TV_2015.png" oninput="changeLogoSrc()">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Logó Alapmérete: <span id="logoSizeVal" style="color:var(--accent-color); font-weight:bold;">60px</span></label>
                    <input type="range" id="logoSizeSlider" min="30" max="200" value="60" oninput="changeLogoSize()">
                </div>
                
                <button class="btn-logo-save" onclick="exportLogoOnlyJSON()">Csak a Logó Beállítások Mentése (logo_only.json) 💾</button>
                <div id="logoStatusLog" class="status-msg" style="color: #8a99ad;">A logó adatai függetlenek a műsortól.</div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>📅 Műsorfolyam Tervező (Műsorújság Generátor)</h2>
        <div class="input-row" style="margin-bottom: 20px;">
            <div>
                <label>Melyik csatorna műsorát írod?:</label>
                <input type="text" id="channelId" value="cinemaster">
            </div>
            <div>
                <label>Adásfolyam fix kezdete:</label>
                <input type="datetime-local" id="streamStartDateTime" onchange="refreshTimeline()">
            </div>
        </div>

        <div style="padding: 15px; background: #1a1f2c; border-radius: 8px; border: 1px solid #ff9100; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px;">
            <div style="flex-grow: 1;">
                <label style="color: #ff9100;">Folytatni szeretnél egy korábbi tervezést?</label>
                <input type="file" id="importFileSelector" accept=".json" style="padding: 5px; font-size: 12px; background: transparent; border: none;">
            </div>
            <button class="btn-load" style="width: auto; white-space: nowrap;" onclick="importScheduleJSON()">Fájl Beolvasása 📂</button>
        </div>

        <div style="padding: 15px; background: #11141a; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px;">
            <div style="font-size: 12px; color: #8a99ad; font-weight: 600; text-transform: uppercase; margin-bottom: 5px;">Adásfolyam lefedettsége:</div>
            <div style="font-size: 15px; color: #fff;">
                A műsorrend jelenleg eddig tart: <strong id="streamEndTimeCounter" style="color: #00e676;">Nincs beállítva</strong>
            </div>
            <div style="font-size: 12px; color: #627288; margin-top: 5px;" id="streamTotalDurationMinutes">
                (Összesen: 0 perc)
            </div>
        </div>

        <hr class="section-divider">

        <div class="form-group" style="margin-bottom:15px">
            <label>Videó / Műsor címe</label>
            <input type="text" id="vTitle" placeholder="pl. Esti nagyfilm: 300">
        </div>
        <div class="form-group" style="margin-bottom:20px">
            <label>Backblaze friendly URL vagy közvetlen link (.mp4)</label>
            <input type="text" id="vUrl" placeholder="https://f003.backblazeb2.com/file/...">
        </div>

        <button id="addBlockBtn" onclick="pushToTimelineIntelligent()">Műsorblokk beszúrása a listába ↓</button>
        <div id="statusConsoleLog" class="status-msg" style="color: #8a99ad;">Rendszer kész.</div>
        
        <div class="catcast-timeline" id="timelineContainer"></div>
        
        <button class="btn-download" onclick="exportScheduleOnlyJSON()">Csak a Műsorrend Mentése (schedule_only.json) 📅</button>
    </div>
</div>

<script>
let catcastPlaylist = [];
let logoConfig = { url: "https://upload.wikimedia.org/wikipedia/commons/a/ab/Logo_TV_2015.png", size: 60, topPercent: 5, leftPercent: 5 };
let masterChannelList = [];

function createNewChannelConfig() {
    const name = document.getElementById('newChannelName').value.trim();
    const id = document.getElementById('newChannelId').value.trim().toLowerCase();
    if(!name || !id) return;
    masterChannelList.push({ id, name });
    const blob = new Blob([JSON.stringify(masterChannelList, null, 2)], {type : 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = "channels.json"; a.click();
}

function changeLogoSrc() { 
    logoConfig.url = document.getElementById('logoUrlInput').value; 
    document.getElementById('channelLogoImg').src = logoConfig.url; 
}

function changeLogoSize() { 
    const size = document.getElementById('logoSizeSlider').value; 
    document.getElementById('logoSizeVal').innerText = size + "px"; 
    document.getElementById('channelLogoImg').style.width = size + "px"; 
    logoConfig.size = parseInt(size); 
}

const logoImg = document.getElementById('channelLogoImg');
const containerBox = document.getElementById('videoBoxContainer');
let isDragging = false; let startX, startY, initialTop, initialLeft;

logoImg.addEventListener('mousedown', (e) => { 
    isDragging = true; 
    startX = e.clientX; 
    startY = e.clientY; 
    initialTop = logoImg.offsetTop; 
    initialLeft = logoImg.offsetLeft; 
    e.preventDefault(); 
});

document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const deltaX = e.clientX - startX; const deltaY = e.clientY - startY;
    let newTop = initialTop + deltaY; let newLeft = initialLeft + deltaX;
    const maxTop = containerBox.clientHeight - logoImg.clientHeight; const maxLeft = containerBox.clientWidth - logoImg.clientWidth;
    if(newTop < 0) newTop = 0; if(newTop > maxTop) newTop = maxTop; if(newLeft < 0) newLeft = 0; if(newLeft > maxLeft) newLeft = maxLeft;
    logoImg.style.top = newTop + 'px'; logoImg.style.left = newLeft + 'px';
    logoConfig.topPercent = (newTop / containerBox.clientHeight) * 100; 
    logoConfig.leftPercent = (newLeft / containerBox.clientWidth) * 100;
});
document.addEventListener('mouseup', () => { isDragging = false; });

async function pushToTimelineIntelligent() {
    const title = document.getElementById('vTitle').value.trim();
    const url = document.getElementById('vUrl').value.trim();
    const startInput = document.getElementById('streamStartDateTime').value;
    const statusLog = document.getElementById('statusConsoleLog');

    if (!startInput || !title || !url) {
        statusLog.style.color = "#ff3d00";
        statusLog.innerText = "⚠️ Hiányzó adatok a beszúráshoz!";
        return;
    }

    statusLog.style.color = "#ff9100";
    statusLog.innerText = "⏳ Valós játékidő lekérése az Archive.org-ról...";
    document.getElementById('addBlockBtn').disabled = true;

    let durationInSeconds = 7200; // Alapértelmezett 120 perc tartaléknak
    let foundDuration = false;

    // 1. HA ARCHIVE.ORG LINK-E
    if (url.includes('archive.org')) {
        try {
            let archiveId = '';
            if (url.includes('/download/')) {
                archiveId = url.split('/download/')[1].split('/')[0];
            } else if (url.includes('/details/')) {
                archiveId = url.split('/details/')[1].split('/')[0];
            }

            if (archiveId) {
                const apiUrl = `https://archive.org/metadata/${archiveId}`;
                const response = await fetch(apiUrl);
                
                if (response.ok) {
                    const metaData = await response.json();
                    
                    // A MÓDSZER: Megnézzük a fő metadata blokkot
                    if (metaData.metadata && metaData.metadata.length) {
                        const rawLength = metaData.metadata.length[0] || metaData.metadata.length;
                        durationInSeconds = parseArchiveLength(rawLength);
                        if (durationInSeconds > 0 && durationInSeconds !== 7200) foundDuration = true;
                    }
                    
                    // B MÓDSZER (GOLYÓÁLLÓ): Ha az A módszer nem nyert, átnézzük a feltöltött fájlok listáját!
                    if (!foundDuration && metaData.files && Array.isArray(metaData.files)) {
                        // Megkeressük azt a fájlt, aminek a neve benne van a beillesztett URL-edben
                        const cleanUrl = decodeURIComponent(url).toLowerCase();
                        const matchingFile = metaData.files.find(f => {
                            if (!f.name) return false;
                            const cleanName = f.name.toLowerCase();
                            return cleanUrl.includes(cleanName) && cleanName.endsWith('.mp4');
                        });

                        // Ha így se találja meg név szerint, vegyük a legelső .mp4 fájlt a csomagból
                        const anyVideoFile = matchingFile || metaData.files.find(f => f.name && f.name.toLowerCase().endsWith('.mp4'));

                        if (anyVideoFile && anyVideoFile.length) {
                            durationInSeconds = parseArchiveLength(anyVideoFile.length);
                            if (durationInSeconds > 0) foundDuration = true;
                        }
                    }
                }
            }
        } catch (apiError) {
            console.log("Nem sikerült elérni az Archive API-t", apiError);
        }
    } else {
        // 2. HA NEM ARCHIVE LINK (PL. BACKBLAZE)
        try {
            const tempVideo = document.createElement('video');
            tempVideo.src = url;
            tempVideo.preload = "metadata";
            tempVideo.crossOrigin = "anonymous";
            
            await new Promise((resolve) => {
                tempVideo.onloadedmetadata = () => {
                    if (!isNaN(tempVideo.duration) && tempVideo.duration > 0) {
                        durationInSeconds = Math.round(tempVideo.duration);
                        foundDuration = true;
                    }
                    resolve();
                };
                tempVideo.onerror = () => resolve();
                setTimeout(resolve, 3000); 
            });
        } catch (e) {
            console.log("Helyi mérés hiba");
        }
    }

    // Blokkszerű hozzáadás
    catcastPlaylist.push({ title, url, duration: durationInSeconds });
    
    document.getElementById('vTitle').value = '';
    document.getElementById('vUrl').value = '';
    document.getElementById('addBlockBtn').disabled = false;
    
    const finalMin = Math.floor(durationInSeconds / 60);
    if (foundDuration) {
        statusLog.style.color = "#00e676";
        statusLog.innerText = `✅ Tűpontosan kinyerve az Archive-ról! Játékidő: ${finalMin} perc.`;
    } else {
        statusLog.style.color = "#ff9100";
        statusLog.innerText = `⚠️ Nem sikerült kiolvasni a hosszt, így tartalékként rákerült a ${finalMin} perc.`;
    }
    
    refreshTimeline();
}

// SEGÉDFÜGGVÉNY: Időformátumok (HH:MM:SS vagy másodperc) biztonságos átváltásához
function parseArchiveLength(rawLength) {
    if (!rawLength) return 7200;
    const strLen = String(rawLength).trim();
    if (strLen.includes(':')) {
        const p = strLen.split(':');
        if (p.length === 3) return (+p[0]) * 3600 + (+p[1]) * 60 + (+p[2]);
        if (p.length === 2) return (+p[0]) * 60 + (+p[1]);
    }
    const num = parseFloat(strLen);
    return (!isNaN(num) && num > 0) ? Math.round(num) : 7200;
}

// ÚJ VISSZATÖRLŐ FUNKCIÓ: Kivágja a műsort a listából, és kényszeríti az újraszámolást
function removeTrackFromTimeline(index) {
    catcastPlaylist.splice(index, 1);
    const statusLog = document.getElementById('statusConsoleLog');
    statusLog.style.color = "#ff9100";
    statusLog.innerText = "🗑️ Műsorszám eltávolítva. Az időterv újraszámolva.";
    refreshTimeline();
}

function refreshTimeline() {
    const startInput = document.getElementById('streamStartDateTime').value; 
    const container = document.getElementById('timelineContainer');
    
    // Ha törlés után teljesen kiürül a lista, alaphelyzetbe hozzuk a számlálókat
    if (!startInput || catcastPlaylist.length === 0) {
        container.innerHTML = '';
        document.getElementById('streamEndTimeCounter').innerText = "Nincs beállítva";
        document.getElementById('streamTotalDurationMinutes').innerText = "(Összesen: 0 perc)";
        return;
    }
    
    container.innerHTML = ''; 
    let parts = startInput.split(/[-T:]/);
    let timelinePointer = new Date(parts[0], parts[1] - 1, parts[2], parts[3], parts[4], 0);
    
    if (isNaN(timelinePointer.getTime())) {
        timelinePointer = new Date();
    }

    let totalSecs = 0;
    catcastPlaylist.forEach((track, index) => {
        let y = timelinePointer.getFullYear();
        let m = String(timelinePointer.getMonth() + 1).padStart(2, '0');
        let d = String(timelinePointer.getDate()).padStart(2, '0');
        let hr = String(timelinePointer.getHours()).padStart(2, '0');
        let min = String(timelinePointer.getMinutes()).padStart(2, '0');
        let sec = String(timelinePointer.getSeconds()).padStart(2, '0');
        
        track.start = `${y}-${m}-${d}T${hr}:${min}:${sec}`;
        
        const startLocal = `${hr}:${min}:${sec}`;
        const dateLocal = timelinePointer.toLocaleDateString([], {month: 'short', day: 'numeric', weekday: 'short'});
        
        timelinePointer = new Date(timelinePointer.getTime() + track.duration * 1000);
        totalSecs += track.duration;
        
        const displayMin = Math.floor(track.duration / 60);
        const displaySec = track.duration % 60;
        
        // BEÉPÍTETT TÖRLES GOMB: Átadja az aktuális sorszámot (index) a removeTrackFromTimeline-nak
        container.innerHTML += `
            <div class="timeline-card">
                <div class="card-time">
                    <span style="display:block; font-size:11px; color:#8a99ad;">${dateLocal}</span>⏱️ ${startLocal}
                </div>
                <div class="card-info">
                    <div class="card-title">${track.title}</div>
                    <div class="card-url">${track.url}</div>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="card-duration">${displayMin}m ${displaySec}s</div>
                    <button class="btn-delete-track" onclick="removeTrackFromTimeline(${index})">❌</button>
                </div>
            </div>`;
    });
    
    const endDateStr = timelinePointer.toLocaleDateString('hu-HU', { month: 'short', day: 'numeric', weekday: 'short' });
    const endTimeStr = timelinePointer.toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('streamEndTimeCounter').innerText = `${endDateStr} ${endTimeStr}`;
    document.getElementById('streamTotalDurationMinutes').innerText = `(Összesen: ${Math.round(totalSecs / 60)} perc)`;
}

function importScheduleJSON() {
    const fileSelector = document.getElementById('importFileSelector');
    const statusLog = document.getElementById('statusConsoleLog');
    
    if (fileSelector.files.length === 0) {
        alert("Kérlek, előbb válaszd ki a lementett .json műsorfájlt!");
        return;
    }
    
    const file = fileSelector.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            
            if (data.schedule && Array.isArray(data.schedule)) {
                catcastPlaylist = data.schedule;
                
                if (catcastPlaylist.length > 0 && catcastPlaylist[0].start) {
                    const savedStart = catcastPlaylist[0].start;
                    document.getElementById('streamStartDateTime').value = savedStart.substring(0, 16);
                }
                
                statusLog.style.color = "#00e676";
                statusLog.innerText = `成功! ${file.name} sikeresen beolvasva. A táblázat helyreállt.`;
                refreshTimeline();
            } else {
                alert("Ez a fájl nem tartalmaz érvényes műsorrendet (schedule)!");
            }
        } catch (err) {
            alert("Hiba történt a JSON fájl feldolgozása során! Biztos jó fájlt választottál?");
        }
    };
    
    reader.readAsText(file);
}

function exportLogoOnlyJSON() {
    const chId = document.getElementById('logoChannelId').value.trim() || "cinemaster";
    const statusLog = document.getElementById('logoStatusLog');
    const logoOutput = { logo: logoConfig };
    
    const blob = new Blob([JSON.stringify(logoOutput, null, 2)], {type : 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); 
    a.href = url; 
    a.download = chId + "_logo.json"; 
    a.click();
    
    statusLog.style.color = "#00e676";
    statusLog.innerText = `✅ Logó sikeresen elmentve: ${chId}_logo.json`;
}

function exportScheduleOnlyJSON() {
    if (catcastPlaylist.length === 0) {
        alert("A műsorrend üres! Előbb adj hozzá blokkokat.");
        return;
    }
    const chId = document.getElementById('channelId').value.trim() || "cinemaster";
    const startInput = document.getElementById('streamStartDateTime').value;
    const statusLog = document.getElementById('statusConsoleLog');
    
    if (!startInput) {
        alert("Kérlek, adj meg egy adásfolyam fix kezdő dátumot, hogy elmenthessem a napi műsort!");
        return;
    }

    // Kinyerjük a dátum részt (YYYY-MM-DD) az inputból (pl. "2026-06-06T15:30" -> "2026-06-06")
    const datePart = startInput.split('T')[0];
    const scheduleOutput = { schedule: catcastPlaylist };
    
    const blob = new Blob([JSON.stringify(scheduleOutput, null, 2)], {type : 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); 
    a.href = url; 
    
    // MEGVÁLTOZTATOTT FÁJLNEV: pl. cinemaster_schedule_2026-06-06.json
    a.download = `${chId}_schedule_${datePart}.json`; 
    a.click();
    
    statusLog.style.color = "#00e676";
    statusLog.innerText = `✅ Műsorrend sikeresen elmentve: ${chId}_schedule_${datePart}.json`;
}
</script>

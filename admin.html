<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>CineMaster - Atombiztos TV Admin</title>
    <style>
        body { background: #0b0d11; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .box { background: #151922; border: 1px solid #232936; padding: 20px; border-radius: 8px; flex: 1; min-width: 300px; }
        h3 { color: #536dfe; margin-top: 0; border-bottom: 1px solid #232936; padding-bottom: 10px; }
        label { display: block; margin: 10px 0 5px; font-size: 12px; color: #8a99ad; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #1f2533; border: 1px solid #323b4f; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 14px; }
        .btn-lila { background: #536dfe; color: white; }
        .btn-kek { background: #00b0ff; color: black; }
        .btn-zold { background: #00e676; color: black; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px; border: 1px solid #232936; text-align: left; }
        th { background: #1f2533; }
        .status { margin-top: 10px; padding: 10px; border-radius: 4px; font-size: 13px; font-weight: bold; background: #221815; color: #ff3d00; text-align: center; }
    </style>
</head>
<body>

<h1>🎬 CineMaster TV Vezérlőközpont</h1>
<p style="color: #627288; font-size: 14px;">Futtasd ezt a fájlt közvetlenül a GitHub-ról a stabil működésért!</p>

<div class="grid">
    <div class="box">
        <h3>✨ 1. Csatorna Regisztráció</h3>
        <label>CSATORNA NEVE (pl. CineMaster Mozi):</label>
        <input type="text" id="chName" value="CineMaster Mozi">
        
        <label>TECHNIKAI AZONOSÍTÓ (szigorúan kisbetű, pl. cinemaster):</label>
        <input type="text" id="chId" value="cinemaster">
        
        <button class="btn-zold" onclick="exportChannels()">Csatornalista Mentése (channels.json)</button>
    </div>

    <div class="box">
        <h3>📅 2. Műsorfolyam Tervező</h3>
        <label>MŰSOR INDÍTÁSI IDEJE (ÉÉÉÉ.HH.NN. ÓÓ:PP):</label>
        <input type="text" id="streamStart" value="2026.06.04. 13:00">
        
        <label>FILM/MŰSOR CÍME:</label>
        <input type="text" id="videoTitle" value="300">
        
        <label>BACKBLAZE DIRECT MP4 LINK:</label>
        <input type="text" id="videoUrl" value="https://f003.backblazeb2.com/file/cinemastertv-tarhely/300.mp4">
        
        <button class="btn-lila" id="btnAdd" onclick="addVideoBlock()">Fájl Hossz Mérése és Hozzáadása ↓</button>
        <div id="statusMsg" class="status" style="background:#1c251f; color:#00e676; display:none;">Készen áll.</div>
    </div>
</div>

<div class="box" style="margin-top: 20px; width: 100%;">
    <h3>📺 3. Aktuális Műsorterv és Mentés</h3>
    
    <table id="scheduleTable">
        <thead>
            <tr>
                <th>Kezdés</th>
                <th>Cím</th>
                <th>Időtartam</th>
                <th>URL</th>
            </tr>
        </thead>
        <tbody id="scheduleBody">
            <tr><td colspan="4" style="text-align:center; color:#627288;">Nincs még film a műsorban.</td></tr>
        </tbody>
    </table>

    <button class="btn-kek" style="font-size:16px; padding:15px;" onclick="exportSchedule()">💾 MŰSORFÁJL MENTÉSE (cinemaster.json)</button>
</div>

<script>
var schedule = [];

// VIDEÓ HOZZÁADÁSA AUTOMATA HOSSZMÉRÉSSEL
function addVideoBlock() {
    var title = document.getElementById('videoTitle').value;
    var url = document.getElementById('videoUrl').value;
    var startTimeStr = document.getElementById('streamStart').value;
    var btn = document.getElementById('btnAdd');
    var statusBox = document.getElementById('statusMsg');
    
    if(!title || !url) { alert("Töltsd ki a címet és az URL-t!"); return; }
    
    btn.innerText = "Mérés folyamatban... Várj...";
    btn.disabled = true;
    
    // Háttérben mérünk egy láthatatlan videó elemmel
    var tempVideo = document.createElement('video');
    tempVideo.src = url;
    
    tempVideo.onloadedmetadata = function() {
        var duration = Math.round(tempVideo.duration);
        
        // Kiszámoljuk a kezdési időpontot a megadott karaktersorozatból
        // Formátum: YYYY.MM.DD. HH:MM -> átalakítjuk szabványos dátummá
        var p = startTimeStr.replace(/\s+/g, '').split('.');
        var t = p[3].split(':');
        var startDate = new Date(p[0], p[1]-1, p[2], t[0], t[1], 0);
        
        // Ha már van elem a listában, az előző után fűzzük
        if(schedule.length > 0) {
            var lastItem = schedule[schedule.length - 1];
            var lastStart = new Date(lastItem.start);
            startDate = new Date(lastStart.getTime() + (lastItem.duration * 1000));
        }
        
        // Hozzáadjuk a tömbhöz
        schedule.push({
            start: startDate.toISOString(),
            title: title,
            duration: duration,
            url: url
        });
        
        // Frissítjük a felületet
        renderTable();
        
        btn.innerText = "Fájl Hossz Mérése és Hozzáadása ↓";
        btn.disabled = false;
        statusBox.style.display = "block";
        statusBox.innerText = "✓ " + title + " sikeresen hozzáadva (" + duration + " mp)!";
    };
    
    tempVideo.onerror = function() {
        alert("Hiba! A videó hossza nem mérhető. Ellenőrizd a DuckDNS linket vagy a Backblaze CORS beállítását!");
        btn.innerText = "Fájl Hossz Mérése és Hozzáadása ↓";
        btn.disabled = false;
    };
}

// TÁBLÁZAT RAJZOLÁS CLASSIC JS ALAPON
function renderTable() {
    var tbody = document.getElementById('scheduleBody');
    tbody.innerHTML = "";
    
    if(schedule.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#627288;">Nincs még film a műsorban.</td></tr>';
        return;
    }
    
    schedule.forEach(function(item) {
        var tr = document.createElement('tr');
        
        var d = new Date(item.start);
        var timeStr = d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        tr.innerHTML = '<td><b>' + timeString + '</b></td>' +
                       '<td>' + item.title + '</td>' +
                       '<td>' + Math.floor(item.duration / 60) + ' perc</td>' +
                       '<td style="color:#627288; font-size:11px;">' + item.url + '</td>';
        tbody.appendChild(tr);
    });
}

// CHANNELS.JSON MENTÉSE
function exportChannels() {
    var name = document.getElementById('chName').value;
    var id = document.getElementById('chId').value;
    var data = [{ id: id, name: name }];
    downloadJson(data, "channels.json");
}

// CINEMASTER.JSON MENTÉSE (A KÉK GOMB)
function exportSchedule() {
    var id = document.getElementById('chId').value;
    
    // Beletesszük a logó konfigurációt is fixen, hogy ne kelljen külön bajlódni vele
    var outputData = {
        logo: {
            url: "https://img.catcast.tv/uploads/12102025/logos/41057-68eadc77d5224.png",
            topPercent: 5,
            leftPercent: 5,
            size: 60
        },
        schedule: schedule
    };
    
    downloadJson(outputData, id + ".json");
}

// LETÖLTÉS INDÍTÁSA A BÖNGÉSZŐBEN
function downloadJson(obj, filename) {
    var str = JSON.stringify(obj, null, 2);
    var blob = new Blob([str], { type: "application/json" });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>CineMaster Stream - Smart TV Live</title>
    <style>
        :root { --bg-color: #090a0e; --panel-color: #141821; --accent-color: #536dfe; --text-color: #e3e8f0; --border-color: #262f3d; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* AZ ALAPÉRTELMEZETT ELRENDEZÉS (RUGALMAS DOBOZ) */
        .page-wrapper { display: flex; flex-direction: column; width: 100vw; height: 100vh; box-sizing: border-box; }

        /* KÜLÖNÁLLÓ VIDEOABLAK */
        .tv-container { 
            position: relative; 
            width: 100%; 
            height: calc(100vh - 220px); /* 220px-et szabadon hagyunk alul a nagyobb sávnak */
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        
        iframe, video { width: 100%; height: 100%; border: none; background: #000; position: absolute; top: 0; left: 0; z-index: 1; display: none; }

        /* ÓRIÁSI FINOMHANGOLÁS: A gombok és az OK.ru menü levágása az Android Boxon is */
        #embedFrame { 
            z-index: 2; 
            width: 106% !important; 
            height: 112% !important; 
            top: -6% !important; 
            left: -3% !important; 
        }

        /* JAVÍTVA: ÁRNYÉKOLÁS ELTÁVOLÍTVA A CSATORNALOGÓRÓL */
        .tv-watermark { 
            position: absolute; 
            opacity: 0.9; 
            pointer-events: none; 
            z-index: 1001 !important; 
            display: block; 
            height: auto !important;
        }

        /* ÚJ: KORHATÁR KARIKA POZÍCIÓ (ÁRNYÉKOLÁS NÉLKÜL) */
        .tv-rating-icon {
            position: absolute;
            opacity: 0.9;
            pointer-events: none;
            z-index: 1002 !important; /* Legfelül helyezkedik el */
            display: none;
            height: auto !important;
        }

        /* 30%-AL LEJJEBB TOLT MŰSORCÍM SZALAG */
        .show-notifier-band {
            position: absolute;
            top: 7.5%; 
            right: -100%; 
            left: auto;
            width: 70%; 
            height: 8.5%; 
            min-height: 42px; 
            max-height: 54px; 
            background: rgba(20, 24, 33, 0.85); 
            backdrop-filter: blur(8px); 
            border-bottom: 3px solid var(--accent-color); 
            border-bottom-left-radius: 8px; 
            z-index: 1000 !important; 
            display: flex;
            align-items: center;
            padding: 0 30px;
            box-sizing: border-box;
            transition: right 0.5s ease-in-out; 
            box-shadow: -4px 4px 20px rgba(0,0,0,0.5);
            pointer-events: none; 
        }
        .show-notifier-band.active {
            right: 0; 
        }
        
        .notifier-live-text {
            color: #ff1744; 
            font-size: 1.65vw; 
            min-font-size: 18px; 
            font-weight: 900;
            text-transform: uppercase;
            margin-right: 10px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .notifier-title {
            font-size: 1.65vw; 
            min-font-size: 18px; 
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-transform: uppercase; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* KÜLÖNÁLLÓ ALSÓ SÁV */
        .info-bar { 
            width: 100%;
            height: 220px;
            background: var(--panel-color); 
            border-top: 1px solid var(--border-color); 
            padding: 20px 2%; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column;
            gap: 18px;
            z-index: 10;
        }

        .info-top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .info-left { display: flex; flex-direction: column; }
        .badge-live { background: #ff1744; color: white; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; width: max-content; margin-bottom: 6px; }
        .show-title { font-size: 24px; font-weight: bold; color: #fff; }
        .time-info { font-size: 20px; font-weight: bold; color: #8a99ad; margin-left: 15px; }
        
        /* VEZÉRLŐ GOMBOK */
        .controls-right { display: flex; gap: 15px; }
        .btn-epg { background: #304ffe; color: white; border: none; padding: 20px 35px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn-epg:hover { background: #1a237e; }
        .btn-fs { background: #2e7d32; color: white; border: none; padding: 20px 35px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn-fs:hover { background: #1b5e20; }

        /* CSATORNAVÁLTÓ GOMBOK */
        .channel-selector { display: flex; gap: 12px; width: 100%; justify-content: flex-start; overflow-x: auto; padding-bottom: 8px; }
        .channel-btn { background: #232936; color: #a4b3c6; border: 1px solid #2c3545; padding: 18px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; font-size: 18px; }
        .channel-btn:hover { background: #323a4b; color: #fff; }
        .channel-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); box-shadow: 0 0 15px rgba(83, 109, 254, 0.4); }

        .epg-modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2000000000 !important; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .epg-modal-overlay.active { opacity: 1; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        .epg-modal { width: 90%; max-width: 650px; background: #12161f; border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; box-sizing: border-box; max-height: 80vh; display: flex; flex-direction: column; }
        
        /* AZ INZERT/BLACKOUT RÉTEG */
        .no-stream-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: transparent; background: #000000; z-index: 995; pointer-events: none; }
        
        .unlock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f1115; z-index: 200001; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .unlock-btn { background: var(--accent-color); color: white; border: none; padding: 22px 50px; font-size: 24px; font-weight: bold; border-radius: 14px; cursor: pointer; }

        :fullscreen .tv-container { width: 100vw; height: 100vh; }
        :-webkit-full-screen .tv-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="unlockOverlay" class="unlock-overlay">
    <div style="font-size: 32px; font-weight: bold; color: #fff; letter-spacing: 2px; margin-bottom: 10px;">CINEMASTER TV</div>
    <button class="unlock-btn" onclick="startTvWithAudio(event)">ÉLŐ ADÁS INDÍTÁSA 🔊</button>
</div>

<div class="page-wrapper" id="pageWrapper">

    <div class="tv-container" id="mainTvContainer">
        <div id="showNotifier" class="show-notifier-band">
            <span class="notifier-live-text">MOST:</span>
            <span id="notifierTitle" class="notifier-title">Műsor címe</span>
        </div>

        <div id="noStreamOverlay" class="no-stream-overlay"></div>
        
        <video id="tvEngine" autoplay></video>
        <iframe id="archiveEngine" allowfullscreen style="display: none;"></iframe>
        
        <img id="tvWatermark" class="tv-watermark" alt="Logo">
        <!-- ÚJ ELEMENT: KORHATÁR KARIKA HELYE -->
        <img id="tvRatingIcon" class="tv-rating-icon" alt="Korhatár">
    </div>

    <div class="info-bar" id="mainInfoBar">
        <div class="info-top-row">
            <div class="info-left">
                <div class="badge-live">Élő adás</div>
                <div style="display: flex; align-items: center;">
                    <span class="show-title" id="lblShow">Betöltés...</span>
                    <span class="time-info" id="lblTime">--:--</span>
                </div>
            </div>
            
            <div class="controls-right">
                <button class="btn-epg" onclick="toggleEpg(true)">Műsorújság (EPG) 📅</button>
                <button class="btn-fs" onclick="toggleNativeFullscreen()">Teljes Képernyő 📺</button>
            </div>
        </div>
        
        <div class="channel-selector" id="channelButtonsContainer">
            <button class="channel-btn active" onclick="switchChannel('cinemaster')">CineMaster</button>
            <button class="channel-btn" onclick="switchChannel('cinemaster2')">CineMaster 2</button>
            <button class="channel-btn" onclick="switchChannel('retrotv')">RetroTV</button>
            <button class="channel-btn" onclick="switchChannel('besthitstv')">Best Hits TV</button>
        </div>
    </div>

    <div id="epgModalOverlay" class="epg-modal-overlay" onclick="toggleEpg(false)">
        <div class="epg-modal" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 id="epgModalTitle" style="margin:0; font-size:24px; color:white;">Műsorújság</h3>
                <button style="background:#ff1744; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px;" onclick="toggleEpg(false)">Bezárás ✕</button>
            </div>
            <div id="epgRowsContainer" style="overflow-y:auto; flex-grow:1;"></div>
        </div>
    </div>

</div>

<script>
const pageWrapper = document.getElementById('pageWrapper');
const container = document.getElementById('mainTvContainer');
const overlay = document.getElementById('noStreamOverlay');
const watermark = document.getElementById('tvWatermark');
const ratingIcon = document.getElementById('tvRatingIcon'); // ÚJ
const lblShow = document.getElementById('lblShow');
const lblTime = document.getElementById('lblTime');
const epgModalOverlay = document.getElementById('epgModalOverlay');
const epgRowsContainer = document.getElementById('epgRowsContainer');
const epgModalTitle = document.getElementById('epgModalTitle');

const showNotifier = document.getElementById('showNotifier');
const notifierTitle = document.getElementById('notifierTitle');

const vid = document.getElementById('tvEngine');
const archiveIframe = document.getElementById('archiveEngine');

let activeChannel = 'cinemaster';
let lastRenderedUrl = '';
let currentLogoConfig = null;
let currentRatingConfig = null; // ÚJ
let isEpgOpen = false;
let userUnlocked = false;
let isIframeLoaded = false; 

let forceBlackoutActive = false;

function startTvWithAudio(e) {
    e.stopPropagation();
    userUnlocked = true;
    document.getElementById('unlockOverlay').style.display = 'none';
    
    vid.muted = false;
    vid.volume = 1.0;
    
    runTvEngine();
}

vid.onended = function() {
    lastRenderedUrl = '';
    isIframeLoaded = false; 
    triggerBlackoutIncert(); 
    runTvEngine();
};

function parseLocalISO(isoStr) {
    let clean = isoStr.replace('Z', '').split('+')[0];
    let parts = clean.split(/[-T:]/);
    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]), parseInt(parts[3]), parseInt(parts[4]), parseInt(parts[5]) || 0);
}

function updateFontSizes() {
    const baseWidth = container.clientWidth;
    const computedFontSize = Math.max(18, baseWidth * 0.0165); 
    const textEls = document.querySelectorAll('.notifier-live-text, .notifier-title');
    textEls.forEach(el => { if(el) el.style.fontSize = computedFontSize + 'px'; });
}

function toggleEpg(show) {
    isEpgOpen = show;
    if (show) {
        epgModalTitle.innerText = "Műsorújság";
        epgModalOverlay.classList.add('active');
    } else {
        epgModalOverlay.classList.remove('active');
    }
}

function toggleNativeFullscreen() {
    if (!document.fullscreenElement) {
        container.requestFullscreen().then(() => setTimeout(updateLogoScale, 100)).catch(err => console.log(err));
    } else {
        document.exitFullscreen();
    }
}

document.addEventListener('fullscreenchange', () => {
    setTimeout(() => { updateLogoScale(); updateRatingScale(); updateFontSizes(); }, 100);
});

window.addEventListener('keydown', function(e) {
    if ((e.keyCode === 27 || e.keyCode === 461 || e.keyCode === 10009) && document.fullscreenElement) {
        e.preventDefault();
        document.exitFullscreen();
    }
});

function updateLogoScale() {
    if (!currentLogoConfig || !currentLogoConfig.url) return;
    const finalSizePx = container.clientWidth * (currentLogoConfig.size / 440);
    watermark.style.width = finalSizePx + 'px';
    watermark.style.top = currentLogoConfig.topPercent + '%';
    watermark.style.left = currentLogoConfig.leftPercent + '%';
}

// ÚJ: DINAMIKUS KORHATÁR SKÁLÁZÓ MOTOR (PONTOSAN ÚGY, AHOGY A LOGÓ IS MŰKÖDIK)
function updateRatingScale() {
    if (!currentRatingConfig || !currentRatingConfig.url) {
        ratingIcon.style.display = 'none';
        return;
    }
    const finalSizePx = container.clientWidth * (currentRatingConfig.size / 440);
    ratingIcon.style.width = finalSizePx + 'px';
    ratingIcon.style.top = currentRatingConfig.topPercent + '%';
    ratingIcon.style.left = currentRatingConfig.leftPercent + '%';
    ratingIcon.style.display = 'block';
}

window.addEventListener('resize', () => setTimeout(() => { updateLogoScale(); updateRatingScale(); updateFontSizes(); }, 50));

function triggerBlackoutIncert() {
    forceBlackoutActive = true;
    overlay.style.display = 'flex';
    setTimeout(() => {
        forceBlackoutActive = false;
    }, 2500); 
}

function switchChannel(channelId) {
    activeChannel = channelId;
    lastRenderedUrl = '';
    isIframeLoaded = false; 
    
    triggerBlackoutIncert(); 
    
    vid.pause();
    vid.removeAttribute('src');
    vid.load();
    vid.style.display = 'none';
    
    let embedFrame = document.getElementById('embedFrame');
    if (embedFrame) {
        embedFrame.src = '';
        embedFrame.style.display = 'none';
    }
    
    archiveIframe.src = '';
    archiveIframe.style.display = 'none';
    
    document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
    const clickedBtn = Array.from(document.querySelectorAll('.channel-btn')).find(btn => btn.getAttribute('onclick').includes(channelId));
    if(clickedBtn) clickedBtn.classList.add('active');
    runTvEngine();
}

async function runTvEngine() {
    if (!userUnlocked) return;

    try {
        try {
            const logoResponse = await fetch(`${activeChannel}_logo.json?t=${new Date().getTime()}`);
            if (logoResponse.ok) {
                const logoConfig = await logoResponse.json();
                if (logoConfig.logo && logoConfig.logo.url) {
                    currentLogoConfig = logoConfig.logo;
                    watermark.src = logoConfig.logo.url;
                    watermark.style.display = 'block';
                    updateLogoScale();
                    updateFontSizes(); 
                }
            } else { watermark.style.display = 'none'; currentLogoConfig = null; }
        } catch (e) { watermark.style.display = 'none'; currentLogoConfig = null; }

        let kombináltMűsor = [];
        const baseDate = new Date(new Date().getTime() - 24 * 60 * 60 * 1000); 
        const formázDátum = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

        for (let i = 0; i < 7; i++) {
            const vizsgáltDátum = new Date(baseDate.getTime() + i * 24 * 60 * 60 * 1000);
            const dátumStr = formázDátum(vizsgáltDátum);

            try {
                const response = await fetch(`${activeChannel}_schedule_${dátumStr}.json?t=${new Date().getTime()}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.schedule && Array.isArray(data.schedule)) {
                        kombináltMűsor = kombináltMűsor.concat(data.schedule);
                    }
                }
            } catch (innerError) {
                console.log(`Műsorfájl nem található vagy üres: ${dátumStr}_schedule.json`);
            }
        }

        const now = new Date();
        let currentTrack = null;

        epgRowsContainer.innerHTML = '';

        kombináltMűsor.forEach(track => {
            const trackStart = parseLocalISO(track.start);
            const trackEnd = new Date(trackStart.getTime() + track.duration * 1000);
            
            if (trackEnd >= now) {
                const napInfo = trackStart.toLocaleDateString('hu-HU', { month: 'short', day: 'numeric', weekday: 'short' });
                const óraPerc = `${String(trackStart.getHours()).padStart(2, '0')}:${String(trackStart.getMinutes()).padStart(2, '0')}`;
                
                epgRowsContainer.innerHTML += `
                    <div style="display:flex; align-items:center; padding:12px; border-bottom:1px solid #1f2633; font-size:18px;">
                        <div style="color:#ffb300; min-width:140px; font-weight:bold; font-size:15px;">${napInfo} ${óraPerc}</div>
                        <div style="color:white; font-weight:bold;">${track.title}</div>
                    </div>`;
            }

            if (now >= trackStart && now < trackEnd) {
                currentTrack = track;
            }
        });

        if (currentTrack) {
            if (!forceBlackoutActive) {
                overlay.style.display = 'none'; 
            }
            
            lblShow.innerText = currentTrack.title;
            
            const trackStart = parseLocalISO(currentTrack.start);
            const trackEnd = new Date(trackStart.getTime() + currentTrack.duration * 1000);
            
            const startHours = String(trackStart.getHours()).padStart(2, '0');
            const startMinutes = String(trackStart.getMinutes()).padStart(2, '0');
            const endHours = String(trackEnd.getHours()).padStart(2, '0');
            const endMinutes = String(trackEnd.getMinutes()).padStart(2, '0');
            lblTime.innerText = `${startHours}:${startMinutes} - ${endHours}:${endMinutes}`;

            let secondsInTrack = Math.floor((now.getTime() - trackStart.getTime()) / 1000);
            if (isNaN(secondsInTrack) || secondsInTrack < 0) {
                secondsInTrack = 0;
            }

            // ==========================================================================
            // 🔞 ÚJ: DYNAMIC JSON-BASED RATING LOGIC
            // ==========================================================================
            if (currentTrack.rating && currentTrack.rating !== "") {
                try {
                    // Közvetlenül a beküldött JSON struktúrát hívja meg (pl. rating_12.json)
                    const ratingResponse = await fetch(`rating_${currentTrack.rating}.json?t=${new Date().getTime()}`);
                    if (ratingResponse.ok) {
                        const ratingData = await ratingResponse.json();
                        if (ratingData.logo && ratingData.logo.url) {
                            currentRatingConfig = ratingData.logo;
                            ratingIcon.src = ratingData.logo.url;
                            updateRatingScale();
                        }
                    } else { ratingIcon.style.display = 'none'; currentRatingConfig = null; }
                } catch (e) { ratingIcon.style.display = 'none'; currentRatingConfig = null; }
            } else {
                ratingIcon.style.display = 'none';
                currentRatingConfig = null;
            }
            // ==========================================================================

            if (!currentTrack.title.toLowerCase().includes('ajánló')) {
                if (secondsInTrack >= 10 && secondsInTrack <= 25) {
                    notifierTitle.innerText = currentTrack.title;
                    showNotifier.classList.add('active');
                } else {
                    showNotifier.classList.remove('active');
                }
            } else {
                showNotifier.classList.remove('active');
            }

            const isEmbed = (currentTrack.url.includes('archive.org') && !currentTrack.url.toLowerCase().endsWith('.mp4')) || 
                            currentTrack.url.includes('ok.ru');

            if (isEmbed) {
                vid.pause();
                vid.style.display = 'none';
                
                let embedFrame = document.getElementById('embedFrame');

                if (secondsInTrack >= (currentTrack.duration - 4)) {
                    if (embedFrame) {
                        embedFrame.style.display = 'none';
                    }
                    overlay.style.display = 'flex'; 
                    overlay.innerText = ""; 
                    lastRenderedUrl = ''; 
                    isIframeLoaded = false; 
                    console.log("Műsor vége észlelve, kép lekapcsolva a tiszta feketeségért.");
                    return;
                }

                if (!isIframeLoaded || !embedFrame || lastRenderedUrl !== currentTrack.url) {
                    
                    isIframeLoaded = true; 
                    lastRenderedUrl = currentTrack.url; 
                    
                    triggerBlackoutIncert(); 
                    
                    if (embedFrame) {
                        embedFrame.remove();
                    }

                    let targetUrl = currentTrack.url;
                    if (targetUrl.includes('?')) {
                        targetUrl = targetUrl.split('?')[0];
                    }

                    if (targetUrl.includes('ok.ru/video/')) {
                        targetUrl = targetUrl.replace('ok.ru/video/', 'ok.ru/videoembed/');
                    }

                    const finalSrc = `${targetUrl}?autoplay=1&fromTime=${secondsInTrack}`;

                    embedFrame = document.createElement('iframe');
                    embedFrame.id = 'embedFrame';
                    embedFrame.style.position = 'absolute';
                    embedFrame.style.top = '0'; embedFrame.style.left = '0'; embedFrame.style.width = '100%'; embedFrame.style.height = '100%';
                    embedFrame.style.border = 'none'; embedFrame.style.zIndex = '2';
                    embedFrame.allow = "autoplay; encrypted-media; fullscreen";
                    embedFrame.src = finalSrc;
                    
                    container.appendChild(embedFrame);
                    embedFrame.style.display = 'block';
                    console.log("Műsor sikeresen elindítva a jó pozícióról:", secondsInTrack, "mp");
                } else {
                    if (embedFrame) {
                        embedFrame.style.display = 'block';
                    }
                }
                
            } else {
                lastRenderedUrl = '';
                isIframeLoaded = false; 
                let embedFrame = document.getElementById('embedFrame');
                if (embedFrame) embedFrame.remove();

                vid.style.display = 'block';
                
                if (vid.src !== currentTrack.url) {
                    vid.src = currentTrack.url;
                    vid.load();
                    vid.currentTime = secondsInTrack;
                    
                    triggerBlackoutIncert(); 
                    
                    vid.muted = false;
                    vid.volume = 1.0; 
                    
                    vid.play().catch(() => {
                        vid.muted = true;
                        vid.play().then(() => {
                            setTimeout(() => { vid.muted = false; vid.volume = 1.0; }, 200);
                        });
                    });
                } else {
                    if (Math.abs(vid.currentTime - secondsInTrack) > 5) {
                        vid.currentTime = secondsInTrack;
                    }
                    if (vid.paused) {
                        vid.play().catch(e => {});
                    }
                    
                    vid.muted = false;
                    vid.volume = 1.0;
                }
            }
        } else {
            lastRenderedUrl = '';
            isIframeLoaded = false; 
            showNotifier.classList.remove('active');
            ratingIcon.style.display = 'none'; // ÚJ ELREJTÉS
            currentRatingConfig = null;
            vid.pause(); 
            vid.style.display = 'none'; 
            
            let embedFrame = document.getElementById('embedFrame');
            if (embedFrame) embedFrame.remove();
            
            archiveIframe.src = '';
            archiveIframe.style.display = 'none';
            
            lblShow.innerText = "Betöltés...";
            lblTime.innerText = "--:--";
            overlay.style.display = 'flex'; 
            overlay.innerText = ""; 
        }
    } catch (error) {
        console.log(error);
        showNotifier.classList.remove('active');
        ratingIcon.style.display = 'none'; // ÚJ ELREJTÉS
        currentRatingConfig = null;
        vid.pause(); 
        vid.style.display = 'none'; 
        
        let embedFrame = document.getElementById('embedFrame');
        if (embedFrame) embedFrame.remove();
        
        overlay.style.display = 'flex'; 
        overlay.innerText = ""; 
    }
}

window.addEventListener('DOMContentLoaded', () => {
    runTvEngine(); 
    setInterval(runTvEngine, 5000); 
});
</script>
</body>
</html>

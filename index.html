<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>CineMaster Smart TV Player</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        
        .video-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background: #000;
        }

        .tv-logo { 
            position: absolute; 
            z-index: 9999; 
            pointer-events: none; 
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.7));
        }

        /* MINDIG LÁTHATÓ VEZÉRLŐSÁV A TESZT IDEJÉRE */
        .tv-control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10000;
        }

        .channel-btn, .action-btn {
            background: #1f2633;
            color: #fff;
            border: 1px solid #3d495e;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .channel-btn.active {
            background: #536dfe;
            border-color: #536dfe;
        }
        .action-btn { background: #2c323f; border-color: #444; }

        .epg-overlay {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 550px; max-height: 450px;
            background: rgba(15, 17, 21, 0.95);
            border: 1px solid #262f3d; border-radius: 12px; padding: 25px;
            z-index: 10050; display: none; overflow-y: auto;
        }
        .epg-header { font-size: 20px; font-weight: bold; border-bottom: 1px solid #262f3d; padding-bottom: 12px; margin-bottom: 15px; color: #ffb300; display: flex; justify-content: space-between; }
        .epg-row { display: flex; padding: 12px; border-bottom: 1px solid #181d26; align-items: center; font-size: 15px; }
        .epg-time { font-family: monospace; font-weight: bold; color: #00e676; min-width: 90px; }
        .epg-title { font-weight: 500; color: #fff; flex-grow: 1; }
    </style>
</head>
<body>

<div class="video-container" id="mainVisualContainer" onclick="unmuteVideo()">
    <img id="tvLogoElement" class="tv-logo" src="" style="display: none;" alt="Logo">
    
    <video id="tvEngine" autoplay muted playsinline></video>
    
    <div id="epgModalWindow" class="epg-overlay">
        <div class="epg-header">
            <span id="epgChannelNameTitle">Műsorújság</span>
            <span style="font-size: 14px; color: #627288; cursor:pointer;" onclick="toggleEPG()">[Bezárás]</span>
        </div>
        <div id="epgRowsContainer"></div>
    </div>
    
    <div id="controlBarElement" class="tv-control-bar">
        <div style="font-size: 12px; color: #8a99ad; font-weight: bold; text-transform: uppercase; margin-right: 10px;">Csatornák:</div>
        <div id="channelButtonsContainer" style="display: flex; gap: 8px;"></div>
        <button class="action-btn" onclick="unmuteVideo()" style="margin-left: auto; background: #00e676; color: #000;">🔊 HANG BE</button>
        <button id="epgToggleBtn" class="action-btn" onclick="toggleEPG()">📅 EPG</button>
        <button class="action-btn" onclick="toggleSmartFullscreen()">📺 Fullscreen</button>
    </div>
</div>

<script>
var currentChannelId = ""; 
var currentChannelName = "";
var playlist = [];
var logoData = {};

// HANG FELOLDÁSA KATTINTÁSRA
function unmuteVideo() {
    var video = document.getElementById('tvEngine');
    video.muted = false;
}

// Csatornalista betöltése
fetch('channels.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(channels) {
        if(channels && channels.length > 0) {
            var container = document.getElementById('channelButtonsContainer');
            container.innerHTML = '';
            
            channels.forEach(function(ch) {
                var btn = document.createElement('button');
                btn.className = 'channel-btn ch-btn-' + ch.id;
                btn.innerText = ch.name;
                btn.onclick = function(e) { 
                    e.stopPropagation(); // Ne indítsa újra a hangot a kattintás
                    switchChannel(ch.id, ch.name); 
                };
                container.appendChild(btn);
            });
            
            // Első csatorna indítása automatikusan
            switchChannel(channels[0].id, channels[0].name);
        }
    }).catch(function(err) {
        console.log("Hiba a channels.json betöltésekor: ", err);
    });

function switchChannel(id, name) {
    currentChannelId = id;
    currentChannelName = name;
    
    document.querySelectorAll('.channel-btn').forEach(function(b) { b.classList.remove('active'); });
    var activeBtn = document.querySelector('.ch-btn-' + id);
    if(activeBtn) activeBtn.classList.add('active');

    fetch(id + '.json?v=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(data) {
            logoData = data.logo;
            playlist = data.schedule;
            setupLogo();
            syncExecution();
        }).catch(function() {
            playlist = [];
        });
}

function setupLogo() {
    var logoImg = document.getElementById('tvLogoElement');
    if (!logoData || !logoData.url) { logoImg.style.display = "none"; return; }
    logoImg.src = logoData.url;
    logoImg.style.top = logoData.topPercent + "%";
    logoImg.style.left = logoData.leftPercent + "%";
    var baseWidthVw = (logoData.size / 600) * 100;
    if(baseWidthVw < 3) baseWidthVw = 4;
    logoImg.style.width = baseWidthVw + "vw";
    logoImg.style.display = "block";
}

function syncExecution() {
    var video = document.getElementById('tvEngine');
    if(!playlist || playlist.length === 0) return;
    
    var now = new Date();
    var currentVideo = playlist.find(function(track) {
        var start = new Date(track.start);
        var end = new Date(start.getTime() + track.duration * 1000);
        return now >= start && now < end;
    });

    if (currentVideo) {
        var offset = (now.getTime() - new Date(currentVideo.start).getTime()) / 1000;
        if (video.src !== currentVideo.url) {
            video.src = currentVideo.url;
            video.currentTime = offset;
            video.play().catch(function() {});
        } else if (Math.abs(video.currentTime - offset) > 3) {
            video.currentTime = offset;
        }
    } else {
        video.src = "";
    }
}

setInterval(function() {
    if(currentChannelId) syncExecution();
}, 1000);

function toggleEPG(e) {
    if(e) e.stopPropagation();
    var modal = document.getElementById('epgModalWindow');
    if (modal.style.display === "none" || modal.style.display === "") {
        modal.style.display = "block";
        renderEPGData();
    } else {
        modal.style.display = "none";
    }
}

function renderEPGData() {
    document.getElementById('epgChannelNameTitle').innerText = '📅 ' + currentChannelName + ' - Műsor';
    var container = document.getElementById('epgRowsContainer');
    container.innerHTML = '';
    
    if(playlist.length === 0) {
        container.innerHTML = '<div style="padding:20px; text-align:center; color:#627288;">Nincs műsor.</div>';
        return;
    }
    
    var now = new Date();
    playlist.forEach(function(track) {
        var startTime = new Date(track.start);
        var endTime = new Date(startTime.getTime() + track.duration * 1000);
        var timeString = startTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        var isLive = (now >= startTime && now < endTime);
        var rowClass = isLive ? "epg-row" : "epg-row"; // leegyszerűsítve a teszthez
        
        container.innerHTML += '<div class="' + rowClass + '"><div class="epg-time">' + timeString + '</div><div class="epg-title">' + track.title + '</div></div>';
    });
}

function toggleSmartFullscreen(e) {
    if(e) e.stopPropagation();
    var container = document.getElementById('mainVisualContainer');
    if (!document.fullscreenElement) {
        container.requestFullscreen().catch(function() {});
    } else {
        document.exitFullscreen();
    }
}
</script>

</body>
</html>

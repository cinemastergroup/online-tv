<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>CineMaster Stream - Smart TV Live</title>
    <style>
        :root { --bg-color: #090a0e; --panel-color: rgba(20, 24, 33, 0.95); --accent-color: #536dfe; --text-color: #e3e8f0; --border-color: #262f3d; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }

        /* A LEJÁTSZÓ KONTÉNER - ALAPÉRTELMEZETTEN TELJES KÉPERNYŐS */
        .tv-container { position: relative; width: 100vw; height: 100vh; background: #000; display: flex; justify-content: center; align-items: center; }
        
        iframe, video { width: 100%; height: 100%; border: none; background: #000; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* MATEMATIKAI ALAPÚ LOGÓ - VÉGIG A HELYÉN MARAD */
        .tv-watermark { 
            position: absolute; 
            opacity: 0.9; 
            pointer-events: none; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.9)); 
            z-index: 999999 !important; 
            display: none; 
            height: auto !important;
        }

        /* REJTHETŐ ALSÓ SMART SÁV */
        .fs-trigger-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; z-index: 100000; }
        
        .info-bar { 
            position: absolute; 
            bottom: -220px; 
            left: 2%; 
            width: 96%; 
            background: var(--panel-color); 
            border: 1px solid var(--border-color); 
            border-bottom: none;
            border-radius: 16px 16px 0 0; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column;
            gap: 15px;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 100001; 
            backdrop-filter: blur(10px);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
        }
        
        /* Ha az egér a trigger zónán vagy magán a sávon van, felúszik */
        .fs-trigger-bottom:hover ~ .info-bar, .info-bar:hover { bottom: 0px; }

        .info-top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .info-left { display: flex; flex-direction: column; }
        .badge-live { background: #ff1744; color: white; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; width: max-content; margin-bottom: 4px; }
        .show-title { font-size: 22px; font-weight: bold; color: #fff; }
        .time-info { font-family: monospace; font-size: 13px; color: #8a99ad; margin-left: 10px; }
        
        /* KONTROLL GOMBOK CSOPORTJA */
        .controls-right { display: flex; gap: 10px; }
        .btn-epg { background: #304ffe; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-epg:hover { background: #1a237e; box-shadow: 0 0 10px rgba(48, 79, 254, 0.5); }
        .btn-fs { background: #2e7d32; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-fs:hover { background: #1b5e20; box-shadow: 0 0 10px rgba(46, 125, 50, 0.5); }

        /* CSATORNA VÁLASZTÓ AZ ALSÓ PANELEN */
        .channel-selector { display: flex; gap: 10px; width: 100%; justify-content: flex-start; overflow-x: auto; padding-bottom: 5px; }
        .channel-btn { background: #232936; color: #a4b3c6; border: 1px solid #2c3545; padding: 10px 22px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; font-size: 14px; }
        .channel-btn:hover { background: #323a4b; color: #fff; border-color: #536dfe; }
        .channel-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); box-shadow: 0 0 15px rgba(83, 109, 254, 0.4); }

        /* KÖZÉPSŐ POPUP MŰSORÚJSÁG (MODAL) */
        .epg-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: fixed; justify-content: center; align-items: center; z-index: 200000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .epg-modal-overlay.active { opacity: 1; pointer-events: auto; display: flex; }
        
        .epg-modal { width: 90%; max-width: 650px; background: #12161f; border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-height: 80vh; display: flex; flex-direction: column; }
        .epg-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px; }
        .epg-title { font-size: 20px; font-weight: bold; color: #fff; margin: 0; }
        .btn-close-epg { background: #ff1744; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .epg-rows-container { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .epg-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #1f2633; font-size: 15px; }
        .epg-row:last-child { border-bottom: none; }
        .epg-time { color: #ffb300; font-family: monospace; font-weight: bold; min-width: 80px; font-size: 16px; }
        .epg-track-title { color: #fff; font-weight: 600; }
        
        .no-stream-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: #8a99ad; font-size: 20px; font-weight: bold; background: #0f1115; z-index: 5; }
    </style>
</head>
<body>

<div class="tv-container" id="mainTvContainer">
    <div class="fs-trigger-bottom"></div>

    <div id="noStreamOverlay" class="no-stream-overlay">📡 Csatorna betöltése...</div>
    <img id="tvWatermark" class="tv-watermark" alt="Logo">
    <div id="mediaPlaceholder" style="width:100%; height:100%;"></div>

    <div class="info-bar" id="mainInfoBar">
        <div class="info-top-row">
            <div class="info-left">
                <div class="badge-live">Élő adás</div>
                <div style="display: flex; align-items: center;">
                    <span class="show-title" id="lblShow">Betöltés...</span>
                    <span class="time-info" id="lblTime">Kezdés: --:--</span>
                </div>
            </div>
            
            <div class="controls-right">
                <button class="btn-epg" onclick="toggleEpg(true)">Műsorújság (EPG) 📅</button>
                <button class="btn-fs" onclick="toggleNativeFullscreen()">Teljes Képernyő 📺</button>
            </div>
        </div>
        
        <div class="channel-selector" id="channelButtonsContainer">
            <button class="channel-btn active" onclick="switchChannel('cinemaster')">CineMaster</button>
            <button class="channel-btn" onclick="switchChannel('cinemaster2')">CineMaster 2</button>
            <button class="channel-btn" onclick="switchChannel('retrotv')">RetroTV</button>
            <button class="channel-btn" onclick="switchChannel('horrorchannel')">Horror Channel</button>
            <button class="channel-btn" onclick="switchChannel('besthitstv')">Best Hits TV</button>
        </div>
    </div>
</div>

<div id="epgModalOverlay" class="epg-modal-overlay" onclick="toggleEpg(false)">
    <div class="epg-modal" onclick="event.stopPropagation()">
        <div class="epg-header">
            <h3 class="epg-title">📺 Mai teljes műsorfolyam</h3>
            <button class="btn-close-epg" onclick="toggleEpg(false)">Bezárás ✕</button>
        </div>
        <div id="epgRowsContainer" class="epg-rows-container"></div>
    </div>
</div>

<script>
const container = document.getElementById('mainTvContainer');
const overlay = document.getElementById('noStreamOverlay');
const watermark = document.getElementById('tvWatermark');
const lblShow = document.getElementById('lblShow');
const lblTime = document.getElementById('lblTime');
const epgModalOverlay = document.getElementById('epgModalOverlay');
const epgRowsContainer = document.getElementById('epgRowsContainer');
const mediaPlaceholder = document.getElementById('mediaPlaceholder');

let activeChannel = 'cinemaster';
let lastRenderedUrl = '';
let currentLogoConfig = null;

function parseLocalISO(isoStr) {
    let clean = isoStr.replace('Z', '');
    let parts = clean.split(/[-T:]/);
    return new Date(parts[0], parts[1] - 1, parts[2], parts[3], parts[4], parts[5] || 0);
}

function toggleEpg(show) {
    if (show) {
        epgModalOverlay.classList.add('active');
    } else {
        epgModalOverlay.classList.remove('active');
    }
}

function toggleNativeFullscreen() {
    if (!document.fullscreenElement) {
        container.requestFullscreen().then(() => setTimeout(updateLogoScale, 100)).catch(err => console.log(err));
    } else {
        document.exitFullscreen();
    }
}

document.addEventListener('fullscreenchange', () => {
    setTimeout(updateLogoScale, 100);
});

function updateLogoScale() {
    if (!currentLogoConfig || !currentLogoConfig.url) return;
    const currentContainerWidth = container.clientWidth;
    const adminControlWidth = 440;
    const exactRatio = currentLogoConfig.size / adminControlWidth;
    const finalSizePx = currentContainerWidth * exactRatio;
    
    watermark.style.width = finalSizePx + 'px';
    watermark.style.top = currentLogoConfig.topPercent + '%';
    watermark.style.left = currentLogoConfig.leftPercent + '%';
}

window.addEventListener('resize', () => setTimeout(updateLogoScale, 50));

function switchChannel(channelId) {
    activeChannel = channelId;
    lastRenderedUrl = '';
    document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
    const clickedBtn = Array.from(document.querySelectorAll('.channel-btn')).find(btn => btn.getAttribute('onclick').includes(channelId));
    if(clickedBtn) clickedBtn.classList.add('active');
    runTvEngine();
}

async function runTvEngine() {
    try {
        const response = await fetch(`${activeChannel}.json?t=${new Date().getTime()}`);
        if (!response.ok) throw new Error("Üres műsor.");
        
        const config = await response.json();
        
        if (config.logo && config.logo.url) {
            currentLogoConfig = config.logo;
            watermark.src = config.logo.url;
            watermark.style.display = 'block';
            updateLogoScale();
        } else {
            watermark.style.display = 'none';
            currentLogoConfig = null;
        }

        const now = new Date();
        let currentTrack = null;
        let currentOffset = 0;

        epgRowsContainer.innerHTML = '';

        config.schedule.forEach(track => {
            const trackStart = parseLocalISO(track.start);
            const trackEnd = new Date(trackStart.getTime() + track.duration * 1000);

            const hr = String(trackStart.getHours()).padStart(2, '0');
            const min = String(trackStart.getMinutes()).padStart(2, '0');
            epgRowsContainer.innerHTML += `<div class="epg-row"><div class="epg-time">${hr}:${min}</div><div class="epg-track-title">${track.title}</div></div>`;

            if (now >= trackStart && now < trackEnd) {
                currentTrack = track;
                currentOffset = (now.getTime() - trackStart.getTime()) / 1000;
            }
        });

        if (currentTrack) {
            overlay.style.display = 'none';
            lblShow.innerText = currentTrack.title;
            
            const startTimestamp = parseLocalISO(currentTrack.start);
            lblTime.innerText = `Kezdés: ${String(startTimestamp.getHours()).padStart(2,'0')}:${String(startTimestamp.getMinutes()).padStart(2,'0')}`;

            if (currentTrack.url !== lastRenderedUrl) {
                lastRenderedUrl = currentTrack.url;
                
                if (currentTrack.url.includes('archive.org')) {
                    let archiveId = '';
                    if (currentTrack.url.includes('/download/')) {
                        archiveId = currentTrack.url.split('/download/')[1].split('/')[0];
                    } else if (currentTrack.url.includes('/details/')) {
                        archiveId = currentTrack.url.split('/details/')[1].split('/')[0];
                    }
                    
                    if (archiveId) {
                        const startSeconds = Math.round(currentOffset);
                        mediaPlaceholder.innerHTML = `<iframe src="https://archive.org/embed/${archiveId}?start=${startSeconds}&autoplay=1" allowfullscreen></iframe>`;
                    } else {
                        mediaPlaceholder.innerHTML = `<video src="${currentTrack.url}" controls autoplay muted></video>`;
                    }
                } else {
                    mediaPlaceholder.innerHTML = `<video id="tvEngine" controls autoplay muted src="${currentTrack.url}"></video>`;
                    const vid = document.getElementById('tvEngine');
                    vid.currentTime = currentOffset;
                    vid.play().catch(() => { vid.muted = true; vid.play().catch(()=>{}); });
                }
            }
        } else {
            mediaPlaceholder.innerHTML = '';
            overlay.style.display = 'flex';
            overlay.innerText = "📡 Jelenleg nincs adás ezen a csatornán.";
            lblShow.innerText = "Adásszünet";
            lblTime.innerText = "Kezdés: --:--";
            watermark.style.display = 'none';
        }

    } catch (error) {
        mediaPlaceholder.innerHTML = '';
        overlay.style.display = 'flex';
        overlay.innerText = "📡 Jelenleg nincs aktív adásfájl.";
        lblShow.innerText = "Adásszünet";
        lblTime.innerText = "Kezdés: --:--";
        watermark.style.display = 'none';
    }
}

// Biztonságos betöltés a háttérben
window.addEventListener('DOMContentLoaded', () => {
    runTvEngine();
    setInterval(runTvEngine, 15000);
});
</script>
</body>
</html>

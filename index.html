<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>CineMaster Smart TV Player with EPG</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        
        .video-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        .tv-logo { 
            position: absolute; 
            z-index: 9999; 
            pointer-events: none; 
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.7));
            transition: width 0.2s;
        }

        /* VEZÉRLŐSÁV AUTOMATA REJTÉSSEL */
        .tv-control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 80%, rgba(0,0,0,0));
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10000;
            opacity: 0; 
            transition: opacity 0.4s ease-in-out;
            pointer-events: none;
        }

        .tv-control-bar.show {
            opacity: 1;
            pointer-events: auto;
        }

        .channel-btn, .action-btn {
            background: #1f2633;
            color: #fff;
            border: 1px solid #3d495e;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }
        .channel-btn:hover, .channel-btn.active {
            background: #536dfe;
            border-color: #536dfe;
            box-shadow: 0 0 10px rgba(83,109,254,0.5);
        }

        .action-btn { background: #2c323f; border-color: #444; }
        .action-btn:hover { background: #00b0ff; border-color: #00b0ff; }
        .epg-active-btn { background: #ffb300 !important; color: #000 !important; border-color: #ffb300 !important; }

        /* TÉVÉS EPG PANEL */
        .epg-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 550px;
            max-height: 450px;
            background: rgba(15, 17, 21, 0.95);
            border: 1px solid #262f3d;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 10050;
            display: none;
            overflow-y: auto;
        }
        .epg-header { font-size: 20px; font-weight: bold; border-bottom: 1px solid #262f3d; padding-bottom: 12px; margin-bottom: 15px; color: #ffb300; display: flex; justify-content: space-between; }
        .epg-row { display: flex; padding: 12px; border-bottom: 1px solid #181d26; align-items: center; font-size: 15px; }
        .epg-row.live { background: rgba(83, 109, 254, 0.18); border-left: 4px solid #536dfe; border-radius: 0 4px 4px 0; }
        .epg-time { font-family: monospace; font-weight: bold; color: #00e676; min-width: 90px; }
        .epg-title { font-weight: 500; color: #fff; flex-grow: 1; }
        .epg-live-tag { font-size: 11px; background: #ff3d00; color: white; padding: 2px 7px; border-radius: 3px; font-weight: bold; }

        /* NYITÓ KÉPERNYŐ OVERLAY */
        .tv-start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0b0d11;
            z-index: 15000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .tv-start-btn {
            background: #536dfe;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(83,109,254,0.6);
            transition: 0.2s;
        }
        .tv-start-btn:hover { background: #3d5afe; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="tvStartGate" class="tv-start-overlay">
    <h1 style="margin-bottom: 25px; font-size: 28px; color: #fff;">🎬 CineMaster Multi-Channel TV</h1>
    <button class="tv-start-btn" onclick="initializeSmartTVConnection()">📺 CSATORNÁK BETÖLTÉSE</button>
</div>

<div class="video-container" id="mainVisualContainer">
    <img id="tvLogoElement" class="tv-logo" src="" style="display: none;" alt="Logo">
    
    <video id="tvEngine" autoplay muted playsinline></video>
    
    <div id="epgModalWindow" class="epg-overlay">
        <div class="epg-header">
            <span id="epgChannelNameTitle">Műsorújság</span>
            <span style="font-size: 14px; color: #627288; cursor:pointer;" onclick="toggleEPG()">[Bezárás]</span>
        </div>
        <div id="epgRowsContainer"></div>
    </div>
    
    <div id="controlBarElement" class="tv-control-bar">
        <div style="font-size: 12px; color: #8a99ad; font-weight: bold; text-transform: uppercase; margin-right: 10px;">Csatornák:</div>
        <div id="channelButtonsContainer" style="display: flex; gap: 8px;"></div>
        <button id="epgToggleBtn" class="action-btn" onclick="toggleEPG()" style="margin-left: auto;">📅 Műsorújság (EPG)</button>
        <button class="action-btn" onclick="toggleSmartFullscreen()">📺 Fullscreen</button>
    </div>
</div>

<script>
let currentChannelId = ""; 
let currentChannelName = "";
let playlist = [];
let logoData = {};
let masterChannels = [];
let uiTimeout;

// ATOMBIZTOS INDÍTÁS SZEKVENCIA
function initializeSmartTVConnection() {
    const video = document.getElementById('tvEngine');
    
    // 1. Eltüntetjük a kaput
    document.getElementById('tvStartGate').style.display = "none";
    
    // 2. Elindítjuk a lejátszást (mivel még muted, a böngésző boldogan engedi)
    video.play().then(() => {
        // 3. HA elindult a kép, egy apró tizedmásodperccel később rákapcsoljuk a hangot
        setTimeout(() => {
            video.muted = false;
        }, 100);
    }).catch(err => {
        // Biztonsági tartalék, ha mégis makacskodna
        video.muted = false;
        video.play().catch(() => {});
    });
    
    // 4. Megjelenítjük a vezérlősávot
    showControlBarWithTimeout();
}

function showControlBarWithTimeout() {
    const bar = document.getElementById('controlBarElement');
    bar.classList.add('show');
    
    clearTimeout(uiTimeout);
    uiTimeout = setTimeout(() => {
        if(document.getElementById('epgModalWindow').style.display !== "block") {
            bar.classList.remove('show');
        }
    }, 3500);
}

document.addEventListener('mousemove', showControlBarWithTimeout);
document.addEventListener('click', showControlBarWithTimeout);

fetch(`channels.json?v=${Date.now()}`)
    .then(r => r.json())
    .then(channels => {
        masterChannels = channels;
        buildChannelButtons();
        if(masterChannels.length > 0) {
            switchChannel(masterChannels[0].id, masterChannels[0].name);
        }
    });

function buildChannelButtons() {
    const container = document.getElementById('channelButtonsContainer');
    container.innerHTML = '';
    masterChannels.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = `channel-btn ch-btn-${ch.id}`;
        btn.innerText = ch.name;
        btn.onclick = () => { switchChannel(ch.id, ch.name); showControlBarWithTimeout(); };
        container.appendChild(btn);
    });
}

function switchChannel(id, name) {
    currentChannelId = id;
    currentChannelName = name;
    
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    const activeBtn = document.querySelector(`.ch-btn-${id}`);
    if(activeBtn) activeBtn.classList.add('active');

    fetch(`${id}.json?v=${Date.now()}`)
        .then(r => r.json())
        .then(data => {
            logoData = data.logo;
            playlist = data.schedule;
            setupLogo();
            syncExecution();
            if(document.getElementById('epgModalWindow').style.display === "block") {
                renderEPGData();
            }
        }).catch(() => {
            document.getElementById('tvEngine').src = "";
            document.getElementById('tvLogoElement').style.display = "none";
            playlist = [];
        });
}

function setupLogo() {
    const logoImg = document.getElementById('tvLogoElement');
    if (!logoData || !logoData.url) { logoImg.style.display = "none"; return; }
    logoImg.src = logoData.url;
    logoImg.style.top = logoData.topPercent + "%";
    logoImg.style.left = logoData.leftPercent + "%";
    let baseWidthVw = (logoData.size / 600) * 100;
    if(baseWidthVw < 3) baseWidthVw = 4;
    logoImg.style.width = baseWidthVw + "vw";
    logoImg.style.display = "block";
}

function syncExecution() {
    const video = document.getElementById('tvEngine');
    if(playlist.length === 0) return;
    
    const now = new Date();
    const currentVideo = playlist.find(track => {
        const start = new Date(track.start);
        const end = new Date(start.getTime() + track.duration * 1000);
        return now >= start && now < end;
    });

    if (currentVideo) {
        const offset = (now.getTime() - new Date(currentVideo.start).getTime()) / 1000;
        if (video.src !== currentVideo.url) {
            video.src = currentVideo.url;
            video.currentTime = offset;
            video.play().catch(() => {});
        } else if (Math.abs(video.currentTime - offset) > 3) {
            video.currentTime = offset;
        }
    } else {
        video.src = "";
        video.removeAttribute("src");
    }
}

setInterval(() => {
    if(currentChannelId) syncExecution();
}, 1000);

function toggleEPG() {
    const modal = document.getElementById('epgModalWindow');
    const btn = document.getElementById('epgToggleBtn');
    
    if (modal.style.display === "none" || modal.style.display === "") {
        modal.style.display = "block";
        btn.classList.add('epg-active-btn');
        renderEPGData();
    } else {
        modal.style.display = "none";
        btn.classList.remove('epg-active-btn');
        showControlBarWithTimeout();
    }
}

function renderEPGData() {
    document.getElementById('epgChannelNameTitle').innerText = `📅 ${currentChannelName} - Műsor`;
    const container = document.getElementById('epgRowsContainer');
    container.innerHTML = '';
    
    if(playlist.length === 0) {
        container.innerHTML = '<div style="padding:20px; text-align:center; color:#627288;">Nincs elérhető műsorterv.</div>';
        return;
    }
    
    const now = new Date();
    playlist.forEach(track => {
        const startTime = new Date(track.start);
        const endTime = new Date(startTime.getTime() + track.duration * 1000);
        const timeString = startTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        let isLive = (now >= startTime && now < endTime);
        let rowClass = isLive ? "epg-row live" : "epg-row";
        let liveTag = isLive ? '<span class="epg-live-tag">ÉLŐ</span>' : '';
        
        container.innerHTML += `<div class="${rowClass}"><div class="epg-time">${timeString}</div><div class="epg-title">${track.title}</div>${liveTag}</div>`;
    });
}

function toggleSmartFullscreen() {
    const container = document.getElementById('mainVisualContainer');
    if (!document.fullscreenElement) {
        container.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen();
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>CineMaster Stream - Smart TV Live</title>
    <style>
        :root { --bg-color: #090a0e; --panel-color: #141821; --accent-color: #536dfe; --text-color: #e3e8f0; --border-color: #262f3d; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* OLDALBURKOLÓ */
        .page-wrapper { display: flex; flex-direction: column; width: 100vw; height: 100vh; box-sizing: border-box; }

        /* VIDEÓ ABLAK (Helyet hagyva a megnövelt alsó sávnak) */
        .tv-container { 
            position: relative; 
            width: 100%; 
            height: calc(100vh - 220px); /* 220px-re emelve a nagyobb sáv miatt */
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        
        iframe, video { width: 100%; height: 100%; border: none; background: #000; position: absolute; top: 0; left: 0; z-index: 1; display: none; }

        .tv-watermark { 
            position: absolute; 
            opacity: 0.9; 
            pointer-events: none; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.9)); 
            z-index: 999 !important;
            display: block; 
            height: auto !important;
        }

        /* ALSÓ SÁV (Megemelt magasság a hatalmas gombokhoz) */
        .info-bar { 
            width: 100%;
            height: 220px;
            background: var(--panel-color); 
            border-top: 1px solid var(--border-color); 
            padding: 20px 2%; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column;
            gap: 18px;
            z-index: 10;
        }

        .info-top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .info-left { display: flex; flex-direction: column; }
        .badge-live { background: #ff1744; color: white; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; width: max-content; margin-bottom: 6px; }
        .show-title { font-size: 24px; font-weight: bold; color: #fff; }
        .time-info { font-size: 20px; font-weight: bold; color: #8a99ad; margin-left: 15px; }
        
        /* MEGNÖVELT VEZÉRLŐ GOMBOK (EPG, Teljes képernyő) */
        .controls-right { display: flex; gap: 15px; }
        .btn-epg { background: #304ffe; color: white; border: none; padding: 20px 35px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn-epg:hover { background: #1a237e; }
        .btn-fs { background: #2e7d32; color: white; border: none; padding: 20px 35px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn-fs:hover { background: #1b5e20; }

        /* MEGNÖVELT CSATORNAVÁLTÓ GOMBOK */
        .channel-selector { display: flex; gap: 12px; width: 100%; justify-content: flex-start; overflow-x: auto; padding-bottom: 8px; }
        .channel-btn { background: #232936; color: #a4b3c6; border: 1px solid #2c3545; padding: 18px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; font-size: 18px; }
        .channel-btn:hover { background: #323a4b; color: #fff; }
        .channel-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); box-shadow: 0 0 15px rgba(83, 109, 254, 0.4); }

        .epg-modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2000000000 !important; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .epg-modal-overlay.active { opacity: 1; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        .epg-modal { width: 90%; max-width: 650px; background: #12161f; border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; box-sizing: border-box; max-height: 80vh; display: flex; flex-direction: column; }
        
        .no-stream-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: #8a99ad; font-size: 22px; font-weight: bold; background: #0f1115; z-index: 5; pointer-events: none; }
        .unlock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f1115; z-index: 200001; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .unlock-btn { background: var(--accent-color); color: white; border: none; padding: 22px 50px; font-size: 24px; font-weight: bold; border-radius: 14px; cursor: pointer; }

        :fullscreen .tv-container { width: 100vw; height: 100vh; }
        :-webkit-full-screen .tv-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="unlockOverlay" class="unlock-overlay">
    <div style="font-size: 32px; font-weight: bold; color: #fff; letter-spacing: 2px; margin-bottom: 10px;">CINEMASTER TV</div>
    <button class="unlock-btn" onclick="startTvWithAudio(event)">ÉLŐ ADÁS INDÍTÁSA 🔊</button>
</div>

<div class="page-wrapper" id="pageWrapper">

    <div class="tv-container" id="mainTvContainer">
        <div id="noStreamOverlay" class="no-stream-overlay">📡 Csatorna betöltése...</div>
        
        <video id="tvEngine" autoplay></video>
        <iframe id="archiveEngine" allowfullscreen style="display: none;"></iframe>
        
        <img id="tvWatermark" class="tv-watermark" alt="Logo">
    </div>

    <div class="info-bar" id="mainInfoBar">
        <div class="info-top-row">
            <div class="info-left">
                <div class="badge-live">Élő adás</div>
                <div style="display: flex; align-items: center;">
                    <span class="show-title" id="lblShow">Betöltés...</span>
                    <span class="time-info" id="lblTime">--:--</span>
                </div>
            </div>
            
            <div class="controls-right">
                <button class="btn-epg" onclick="toggleEpg(true)">Műsorújság (EPG) 📅</button>
                <button class="btn-fs" onclick="toggleNativeFullscreen()">Teljes Képernyő 📺</button>
            </div>
        </div>
        
        <div class="channel-selector" id="channelButtonsContainer">
            <button class="channel-btn active" onclick="switchChannel('cinemaster')">CineMaster</button>
            <button class="channel-btn" onclick="switchChannel('cinemaster2')">CineMaster 2</button>
            <button class="channel-btn" onclick="switchChannel('retrotv')">RetroTV</button>
            <button class="channel-btn" onclick="switchChannel('horrorchannel')">Horror Channel</button>
            <button class="channel-btn" onclick="switchChannel('besthitstv')">Best Hits TV</button>
        </div>
    </div>

    <div id="epgModalOverlay" class="epg-modal-overlay" onclick="toggleEpg(false)">
        <div class="epg-modal" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 id="epgModalTitle" style="margin:0; font-size:24px; color:white;">Műsorújság</h3>
                <button style="background:#ff1744; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px;" onclick="toggleEpg(false)">Bezárás ✕</button>
            </div>
            <div id="epgRowsContainer" style="overflow-y:auto; flex-grow:1;"></div>
        </div>
    </div>

</div>

<script>
const pageWrapper = document.getElementById('pageWrapper');
const container = document.getElementById('mainTvContainer');
const overlay = document.getElementById('noStreamOverlay');
const watermark = document.getElementById('tvWatermark');
const lblShow = document.getElementById('lblShow');
const lblTime = document.getElementById('lblTime');
const epgModalOverlay = document.getElementById('epgModalOverlay');
const epgRowsContainer = document.getElementById('epgRowsContainer');
const epgModalTitle = document.getElementById('epgModalTitle');

const vid = document.getElementById('tvEngine');
const archiveIframe = document.getElementById('archiveEngine');

let activeChannel = 'cinemaster';
let lastRenderedUrl = '';
let currentLogoConfig = null;
let isEpgOpen = false;
let userUnlocked = false;

function startTvWithAudio(e) {
    e.stopPropagation();
    userUnlocked = true;
    document.getElementById('unlockOverlay').style.display = 'none';
    
    vid.muted = false;
    vid.volume = 1.0;
    
    runTvEngine();
}

vid.onended = function() {
    lastRenderedUrl = '';
    runTvEngine();
};

function parseLocalISO(isoStr) {
    let clean = isoStr.replace('Z', '').split('+')[0];
    let parts = clean.split(/[-T:]/);
    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]), parseInt(parts[3]), parseInt(parts[4]), parseInt(parts[5]) || 0);
}

function toggleEpg(show) {
    isEpgOpen = show;
    if (show) {
        const ma = new Date();
        epgModalTitle.innerText = `Műsorújság (${ma.getFullYear()}-${String(ma.getMonth() + 1).padStart(2, '0')}-${String(ma.getDate()).padStart(2, '0')})`;
        epgModalOverlay.classList.add('active');
    } else {
        epgModalOverlay.classList.remove('active');
    }
}

function toggleNativeFullscreen() {
    if (!document.fullscreenElement) {
        container.requestFullscreen().then(() => setTimeout(updateLogoScale, 100)).catch(err => console.log(err));
    } else {
        document.exitFullscreen();
    }
}

document.addEventListener('fullscreenchange', () => {
    setTimeout(updateLogoScale, 100);
});

window.addEventListener('keydown', function(e) {
    if ((e.keyCode === 27 || e.keyCode === 461 || e.keyCode === 10009) && document.fullscreenElement) {
        e.preventDefault();
        document.exitFullscreen();
    }
});

function updateLogoScale() {
    if (!currentLogoConfig || !currentLogoConfig.url) return;
    const finalSizePx = container.clientWidth * (currentLogoConfig.size / 440);
    watermark.style.width = finalSizePx + 'px';
    watermark.style.top = currentLogoConfig.topPercent + '%';
    watermark.style.left = currentLogoConfig.leftPercent + '%';
}

window.addEventListener('resize', () => setTimeout(updateLogoScale, 50));

function switchChannel(channelId) {
    activeChannel = channelId;
    lastRenderedUrl = '';
    vid.pause();
    vid.removeAttribute('src');
    vid.load();
    vid.style.display = 'none';
    archiveIframe.src = '';
    archiveIframe.style.display = 'none';
    
    document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
    const clickedBtn = Array.from(document.querySelectorAll('.channel-btn')).find(btn => btn.getAttribute('onclick').includes(channelId));
    if(clickedBtn) clickedBtn.classList.add('active');
    runTvEngine();
}

async function runTvEngine() {
    if (!userUnlocked) return;

    try {
        try {
            const logoResponse = await fetch(`${activeChannel}_logo.json?t=${new Date().getTime()}`);
            if (logoResponse.ok) {
                const logoConfig = await logoResponse.json();
                if (logoConfig.logo && logoConfig.logo.url) {
                    currentLogoConfig = logoConfig.logo;
                    watermark.src = logoConfig.logo.url;
                    watermark.style.display = 'block';
                    updateLogoScale();
                }
            } else { watermark.style.display = 'none'; currentLogoConfig = null; }
        } catch (e) { watermark.style.display = 'none'; currentLogoConfig = null; }

        const response = await fetch(`${active

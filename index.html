<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Catcast Multi-Channel TV - Élő Adás</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .video-container { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; background: #000; }
        .tv-logo { position: absolute; z-index: 999; pointer-events: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); display: none; }
        .info-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(15, 17, 21, 0.85); backdrop-filter: blur(10px); color: #fff; padding: 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #262f3d; z-index: 1000; transition: opacity 0.5s; }
        .info-left { display: flex; flex-direction: column; }
        .channel-title { font-size: 14px; color: #536dfe; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .show-title { font-size: 18px; font-weight: bold; }
        .time-info { font-family: monospace; font-size: 16px; color: #ffb300; background: #11141a; padding: 6px 12px; border-radius: 6px; border: 1px solid #262f3d; }
        .no-stream { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: #8a99ad; font-size: 20px; font-weight: bold; background: #0f1115; z-index: 500; }
    </style>
</head>
<body>

<div class="video-container">
    <div id="noStreamOverlay" class="no-stream">📡 Csatorna betöltése...</div>
    <img id="tvWatermark" class="tv-logo" alt="Logo">
    <video id="tvEngine" crossorigin="anonymous"></video>

    <div class="info-bar" id="infoBar">
        <div class="info-left">
            <div class="channel-title" id="lblChannel">CineMaster Élő Adás</div>
            <div class="show-title" id="lblShow">Műsor betöltése...</div>
        </div>
        <div class="time-info" id="lblTime">Kezdés: --:--</div>
    </div>
</div>

<script>
const videoElement = document.getElementById('tvEngine');
const overlay = document.getElementById('noStreamOverlay');
const watermark = document.getElementById('tvWatermark');
const lblShow = document.getElementById('lblShow');
const lblTime = document.getElementById('lblTime');

// Kinyerjük a csatorna ID-t a URL-ből (pl. tv.html?channel=cinemaster), ha nincs, marad a cinemaster
const urlParams = new URLSearchParams(window.location.search);
const channelId = urlParams.get('channel') || 'cinemaster';

function parseLocalISO(isoStr) {
    // Biztosítjuk, hogy az időzónák ne kavarjanak be
    let clean = isoStr.replace('Z', '');
    let parts = clean.split(/[-T:]/);
    return new Date(parts[0], parts[1] - 1, parts[2], parts[3], parts[4], parts[5] || 0);
}

async function runTvEngine() {
    try {
        // Friss JSON lekérése a GitHub-ról cache nélkül
        const response = await fetch(`${channelId}.json?t=${new Date().getTime()}`);
        if (!response.ok) throw new Error("Nem található műsorfájl.");
        
        const config = await response.json();
        
        // Logó beállítása
        if (config.logo && config.logo.url) {
            watermark.src = config.logo.url;
            watermark.style.width = config.logo.size + 'px';
            watermark.style.top = config.logo.topPercent + '%';
            watermark.style.left = config.logo.leftPercent + '%';
            watermark.style.display = 'block';
        }

        const now = new Date();
        let currentTrack = null;
        let currentOffset = 0;

        // Megkeressük, mi fut most
        config.schedule.forEach(track => {
            const trackStart = parseLocalISO(track.start);
            const trackEnd = new Date(trackStart.getTime() + track.duration * 1000);

            if (now >= trackStart && now < trackEnd) {
                currentTrack = track;
                currentOffset = (now.getTime() - trackStart.getTime()) / 1000;
            }
        });

        if (currentTrack) {
            overlay.style.display = 'none';
            lblShow.innerText = currentTrack.title;
            
            const startTimestamp = parseLocalISO(currentTrack.start);
            lblTime.innerText = `Kezdés: ${String(startTimestamp.getHours()).padStart(2,'0')}:${String(startTimestamp.getMinutes()).padStart(2,'0')}`;

            // Csak akkor váltunk forrást, ha új videó jön
            if (videoElement.src !== currentTrack.url) {
                videoElement.src = currentTrack.url;
                videoElement.currentTime = currentOffset;
                
                // GOLYÓÁLLÓ AUTOMATA INDÍTÁS
                videoElement.play().catch(() => {
                    // Ha a böngésző hisztizik a hang miatt, lenémítjuk és úgy indítjuk el automatikusan!
                    videoElement.muted = true;
                    videoElement.play().catch(err => console.log("Lejátszási hiba:", err));
                });
            } else {
                // Ha nagyon elcsúszna az idő (pl. pufferelés miatt), finoman utánhúzzuk
                if (Math.abs(videoElement.currentTime - currentOffset) > 3) {
                    videoElement.currentTime = currentOffset;
                }
            }
        } else {
            videoElement.pause();
            videoElement.removeAttribute('src');
            overlay.style.display = 'flex';
            overlay.innerText = "📡 Jelenleg nincs adás ezen a csatornán.";
            lblShow.innerText = "Adásszünet";
            lblTime.innerText = "Kezdés: --:--";
        }

    } catch (error) {
        console.error(error);
        overlay.style.display = 'flex';
        overlay.innerText = "⚠️ Hiba a műsorfolyam betöltése közben.";
    }
}

// Azonnali indítás és folyamatos szinkronizáció 5 másodpercenként
runTvEngine();
setInterval(runTvEngine, 5000);
</script>
</body>
</html>

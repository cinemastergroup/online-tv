<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>CineMaster Player</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* A VIDEÓT ÉS LOGÓT ÖSSZEFOGÓ DOBOZ */
        .video-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        /* A LOGÓ: MOSTANTÓL DINAMIKUS MÉRETTEL */
        .tv-logo { 
            position: absolute; 
            z-index: 9999; 
            pointer-events: none; /* Nem zavar bele a kattintásba */
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.7));
            transition: width 0.2s;
        }

        /* EGYEDI TELJES KÉPERNYŐS GOMB STÍLUS */
        .custom-fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 50px;
            z-index: 10000;
            background: rgba(0,0,0,0.6);
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .custom-fullscreen-btn:hover { background: #536dfe; }
    </style>
</head>
<body>

<div class="video-container" id="mainVisualContainer">
    <img id="tvLogoElement" class="tv-logo" src="" style="display: none;" alt="Logo">
    
    <video id="tvEngine" autoplay muted controls></video>
    
    <button class="custom-fullscreen-btn" onclick="toggleSmartFullscreen()">📺 Valódi Teljes Képernyő</button>
</div>

<script>
const channelId = "cinemaster"; // A te csatornád azonosítója
let playlist = [];
let logoData = {};

// 1. Betöltjük a műsort és a logó beállításokat
fetch(`${channelId}.json?v=${Date.now()}`)
    .then(r => r.json())
    .then(data => {
        logoData = data.logo;
        playlist = data.schedule;
        setupLogo();
        startTvEngine();
        setInterval(startTvEngine, 1000); // Folyamatos szinkron
    });

// 2. Beállítjuk a logót arányos méretezéssel
function setupLogo() {
    const logoImg = document.getElementById('tvLogoElement');
    if (!logoData || !logoData.url) return;
    
    logoImg.src = logoData.url;
    logoImg.style.top = logoData.topPercent + "%";
    logoImg.style.left = logoData.leftPercent + "%";
    
    // TRÜKK: Az adminban lévő méret (pl. 60px) alapján kiszámolunk egy szép, arányos képernyőszélességet (vw)
    // Így tévén és monitoron is hajszálpontosan ugyanakkorának fog tűnni!
    let baseWidthVw = (logoData.size / 600) * 100; 
    if(baseWidthVw < 3) baseWidthVw = 4; // Minimális biztonsági méret
    logoImg.style.width = baseWidthVw + "vw";
    
    logoImg.style.display = "block";
}

// 3. Valós idejű lejátszó motor
function startTvEngine() {
    const video = document.getElementById('tvEngine');
    const now = new Date();
    
    const currentVideo = playlist.find(track => {
        const start = new Date(track.start);
        const end = new Date(start.getTime() + track.duration * 1000);
        return now >= start && now < end;
    });

    if (currentVideo) {
        const offset = (now.getTime() - new Date(currentVideo.start).getTime()) / 1000;
        if (video.src !== currentVideo.url) {
            video.src = currentVideo.url;
            video.currentTime = offset;
            video.play().catch(() => {});
        } else if (Math.abs(video.currentTime - offset) > 3) {
            video.currentTime = offset; // Ha elcsúszna, visszarántja
        }
    } else {
        video.src = ""; // Adásszünet
    }
}

// 4. ATOMBIZTOS TELJES KÉPERNYŐ (A dobozt nagyítja, így a logó megmarad)
function toggleSmartFullscreen() {
    const container = document.getElementById('mainVisualContainer');
    if (!document.fullscreenElement) {
        container.requestFullscreen().catch(err => {
            alert(`Hiba a teljes képernyőre váltáskor: ${err.message}`);
        });
    } else {
        document.exitFullscreen();
    }
}
</script>

</body>
</html>
